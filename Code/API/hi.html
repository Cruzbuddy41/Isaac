<!DOCTYPE html>
<html>
<head>
    <title>Robot Control</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        #feed { width: 80%; border: 5px solid #333; margin-top: 20px; }
        .status { font-size: 30px; color: #00ff00; margin: 20px; }
        button { padding: 20px; font-size: 20px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Robot Brain View</h1>
    <div class="status">Current Logic: <span id="stat">Loading...</span></div>

    <img id="feed" src="lanes_result.jpg">

    <br>
    <button style="background: red;" onclick="fetch('/stop', {method:'POST'})">EMERGENCY STOP</button>
    <button style="background: green;" onclick="fetch('/resume', {method:'POST'})">RESUME AUTO</button>

    <script>
        setInterval(() => {
            // Update Image
            document.getElementById('feed').src = 'lanes_result.jpg?t=' + Date.now();

            // Update Text Status
            fetch('/get_log')
                .then(r => r.json())
                .then(data => { document.getElementById('stat').innerText = data.status; });
        }, 1000); // Refresh every 1 second
    </script>
</body>
</html>
