<!DOCTYPE html>
<html lang="en">
<head>
    <title>Robot Live Console</title>
</head>
<body>
    <h1>Live Feed</h1>
    <img id="liveImage" src="/get_processed_image" alt="Live Stream" style="width:100%; max-width:800px; border: 5px solid #333;">

    <br>
    <button onclick="triggerMoveForward()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">Move Forward</button>
    <button onclick="triggerMoveLeft()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">Move Left</button>
    <button onclick="triggerMoveRight()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">Move Right</button>
    <button onclick="stop()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px; background-color: red; color: white;">Stop</button>
    <button onclick="resume()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px; background-color: green; color: white;">Resume</button>

    <hr>
    <h1>Console</h1>
    <h2 id="console" style="color: blue; font-family: monospace;">System Ready...</h2>

    <script>
        setInterval(updateImage, 2000);

        function updateImage() {
            fetch('/img', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                const imgElement = document.getElementById('liveImage');
                imgElement.src = '/get_processed_image?t=' + new Date().getTime();
                document.getElementById('console').textContent = "Status: " + data.message;
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('console').textContent = "Error: Connection Lost";
            });
        }

        function triggerMoveForward() {
            sendControl('/move', 'Just keep on swimming');
        }

        function triggerMoveLeft() {
            sendControl('/moveLeft', 'Sliiiiiide to the left (CRISS CROSS)');
        }

        function triggerMoveRight() {
            sendControl('/moveRight', 'Sliiiiide to the right');
        }

        function stop() {
            sendControl('/stop', 'STOP PLEASE');
        }

        function resume() {
            sendControl('/resume', 'Resuminggg');
        }
        function sendControl(route, consoleMessage) {
            document.getElementById('console').textContent = consoleMessage;
            fetch(route, { method: 'POST' })
            .then(response => response.json())
            .then(data => console.log("Server response:", data))
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('console').textContent = "Action Failed!";
            });
        }
    </script>
</body>
</html>
