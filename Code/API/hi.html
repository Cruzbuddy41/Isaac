<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Image Update</title>
</head>
<body>
    <h1>Live Feed</h1>
    <img id="liveImage" src="lanes_result.jpg" alt="Live Stream" style="width:100%; max-width:800px;">
    <br>
    <button onclick="triggerMoveForward()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">
        Move Forward
    </button>
    <button onclick="triggerMoveLeft()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">
        Move Left
    </button>
    <button onclick="triggerMoveRight()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">
        Move Right
    </button>
    <button onclick="stop()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">
        Stop
    </button>
    <button onclick="resume()" style="padding: 15px 30px; font-size: 18px; margin-top: 10px;">
        Stop
    </button>
    <script>
        function updateImage() {
            const img = document.getElementById('liveImage');
            img.src = "lanes_result.jpg?t=" + new Date().getTime();
        }
        setInterval(updateImage, 1000);
        function triggerMoveForward() {
            fetch('/move', { method: 'POST' })
                .then(response => response.json())
                .then(data => console.log("Success:", data.message))
                .catch(error => console.error("Error calling Python:", error));
        }
        function triggerMoveLeft() {
                fetch('/moveLeft', { method: 'POST' })
                .then(response => response.json())
                .then(data => console.log("Success:", data.message))
                .catch(error => console.error("Error calling Python:", error));
        }
        function triggerMoveRight() {
                fetch('/moveRight', { method: 'POST' })
                .then(response => response.json())
                .then(data => console.log("Success:", data.message))
                .catch(error => console.error("Error calling Python:", error));
        }
        function stop() {
                fetch('/stop', { method: 'POST' })
                .then(response => response.json())
                .then(data => console.log("Success:", data.message))
                .catch(error => console.error("Error calling Python:", error));
        }
        function resume() {
                fetch('/resume', { method: 'POST' })
                .then(response => response.json())
                .then(data => console.log("Success:", data.message))
                .catch(error => console.error("Error calling Python:", error));
        }
    </script>
</body>
</html>
