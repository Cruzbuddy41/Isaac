<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Image Update</title>
</head>
<body>
    <h1>Live Feed</h1>
    <img id="liveImage" src="lanes_result.jpg" alt="Live Stream" style="width:100%; max-width:800px;">

    <script>
        function updateImage() {
            const img = document.getElementById('liveImage');
            img.src = "lanes_result.jpg?t=" + new Date().getTime();
        }
        setInterval(updateImage, 1000);
    </script>
</body>
</html>
