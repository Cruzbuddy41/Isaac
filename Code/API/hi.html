<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robot Control Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #liveImage { width: 100%; border: 4px solid #444; border-radius: 8px; background: #000; }
        .status-card { background: #3d3d3d; padding: 15px; margin-bottom: 20px; border-radius: 8px; border-left: 8px solid #007bff; font-size: 28px; font-weight: bold; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; font-weight: bold; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #dc3545; color: white; grid-column: span 2; }
        .btn-green { background: #28a745; color: white; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            Status: <span id="movementStatus" style="color:#007bff;">READY</span>
        </div>

        <img id="liveImage" src="lanes_result.jpg" alt="Processing Feed...">

        <div class="controls">
            <button class="btn-blue" onclick="apiCall('/moveLeft')">← Left</button>
            <button class="btn-blue" onclick="apiCall('/move')">↑ Forward</button>
            <button class="btn-blue" onclick="apiCall('/moveRight')">Right →</button>

            <button class="btn-red" onclick="apiCall('/stop')">EMERGENCY STOP</button>
            <button class="btn-green" onclick="apiCall('/resume')">Resume Auto</button>
        </div>
    </div>

    <script>
        // Update processed image every 1.5 seconds
        setInterval(updateImage, 1500);
        // Update movement status text every 0.5 seconds
        setInterval(updateStatus, 500);

        function updateImage() {
            // We still hit /img to tell the robot to take a new picture
            fetch('/img', { method: 'POST' })
            .then(() => {
                const img = document.getElementById('liveImage');
                // We reload lanes_result.jpg (the one with triangles)
                img.src = 'lanes_result.jpg?t=' + new Date().getTime();
            });
        }

        function updateStatus() {
            fetch('/get_log')
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById('movementStatus');
                el.innerText = data.status;
                // Change color based on status
                el.style.color = data.status === "STOP" ? "#dc3545" : "#007bff";
            });
        }

        function apiCall(endpoint) {
            fetch(endpoint, { method: 'POST' })
            .then(res => res.json())
            .then(data => console.log("Action:", data.message));
        }
    </script>
</body>
</html>
